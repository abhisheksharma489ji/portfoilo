<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raath Sport Shooting Academy</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; background: white; padding: 20px; margin: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 5px; }
        .sub-title { color: #666; font-size: 14px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #007bff; outline: none; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .admin-btn { background: #28a745; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 राथ शूटिंग एकेडमी</h2>
    <div class="sub-title">एडमिशन एवं स्मार्ट स्कोर ट्रैकर</div>
    
    <form id="dataForm" autocomplete="off">
        <input type="text" id="admissionId" placeholder="एडमिशन नंबर (Admission ID)" required>
        <input type="text" id="studentName" list="studentSuggestions" placeholder="विद्यार्थी का नाम लिखें..." required>
        <datalist id="studentSuggestions"></datalist>
        <input type="number" id="shootingScore" placeholder="आज का शूटिंग स्कोर (Score)" min="0" max="400" required>
        <button type="submit">डेटाबेस में सुरक्षित सेव करें</button>
    </form>

    <button class="admin-btn" onclick="viewAdminData()">🛡️ एडमिन/कोच लॉगिन</button>
</div>

<script>
    // ऐप डाउनलोड सिस्टम (Service Worker) - 100% वर्किंग लिंक के साथ
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log("SW Registered Successfully"))
            .catch(err => console.log("SW Registration Failed", err));
        });
    }

    // पुराने नामों को स्मार्ट सजेशन लिस्ट में लोड करना
    function loadNameSuggestions() {
        const allData = JSON.parse(localStorage.getItem('academyDatabase')) || [];
        const datalist = document.getElementById('studentSuggestions');
        datalist.innerHTML = '';
        const uniqueNames = [...new Set(allData.map(item => item.name))];
        uniqueNames.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            datalist.appendChild(option);
        });
    }

    // डेटा सेविंग और ऑटोमैटिक रिफ्रेश बिना हैंग के
    document.getElementById('dataForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('admissionId').value.trim();
        const name = document.getElementById('studentName').value.trim();
        const score = document.getElementById('shootingScore').value;
        const date = new Date().toLocaleString();

        const studentData = { id, name, score, date };
        let allData = JSON.parse(localStorage.getItem('academyDatabase')) || [];
        allData.push(studentData);
        localStorage.setItem('academyDatabase', JSON.stringify(allData));

        alert(`✅ ${name} का स्कोर सुरक्षित सेव हो गया है!`);
        document.getElementById('dataForm').reset();
        loadNameSuggestions();
    });

    // कोच पासवर्ड सिस्टम
    function viewAdminData() {
        const password = prompt("कोच सर, सुरक्षा पासवर्ड दर्ज करें:");
        if (password === "raath777") { 
            let allData = localStorage.getItem('academyDatabase');
            if (!allData || JSON.parse(allData).length === 0) {
                alert("📂 डेटाबेस अभी खाली है।");
            } else {
                let formattedData = "📜 --- राथ एकेडमी: वास्तविक रिकॉर्ड --- \n\n";
                JSON.parse(allData).forEach((item, index) => {
                    formattedData += `${index + 1}. [ID: ${item.id}] | नाम: ${item.name} | स्कोर: ${item.score} | दिनांक: ${item.date}\n`;
                });
                alert(formattedData);
            }
        } else {
            alert("❌ गलत पासवर्ड।");
        }
    }

    window.onload = loadNameSuggestions;
</script>
</body>
</html>
